name: CI and Security

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  javascript:
    name: JavaScript tests and linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest tests
        run: npm test

      - name: Check JavaScript dependencies
        run: npm run audit --audit-level=high

  php:
    name: PHP tests and static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: composer test:php

      - name: Run PHPStan
        run: composer analyse:php

      - name: Check PHP dependencies
        run: composer audit

  security:
    name: Security scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan dependencies with OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "password-lab-devsecops"
          path: "."
          format: "HTML"
          out: "reports/dependency-check"
          args: "--failOnCVSS 7"

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports/dependency-check
          if-no-files-found: warn
